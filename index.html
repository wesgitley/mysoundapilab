<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ear Drummers - Audio Playback</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; text-align: center; }
    button { padding: 12px 24px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    button:hover { background: #45a049; }
    input[type="file"] { margin: 20px 0; }
    audio { width: 100%; margin-top: 20px; }
    h1 { color: #333; }
    section { margin: 40px 0; }
  </style>
</head>
<body>
  <h1>Ear Drummers</h1>
  
  <section>
    <h2>Taking the Vibez up a Notch</h2>
    <p></p>
    <label for="audioFile">Choose Audio File:</label><br><br>
    <input type="file" id="audioFile" accept="audio/*">
    <br><br>
  </section>


</body>
</html>
